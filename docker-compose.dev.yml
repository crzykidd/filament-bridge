# Local dev stack — same services as docker-compose.yml, but with the data
# directories bind-mounted under ./private_data/ instead of named volumes, so
# you can inspect/seed them from the host (e.g. drop a prod spoolman.db into
# ./private_data/spoolman/). ./private_data/ is gitignored, so this file is safe
# to track: no real data is ever committed.
#
# First run: `mkdir -p private_data/{filament-bridge,filament-db,spoolman}` so the
# dirs are owned by you (otherwise Compose creates them as root). Then:
#   docker compose -f docker-compose.dev.yml up -d --build
services:
  filament-bridge:
    build: .
    ports:
      - "8090:8090"
    volumes:
      - ./private_data/filament-bridge:/data
    environment:
      FILAMENTDB_URL: http://filament-db:3000
      SPOOLMAN_URL: http://spoolman:7912
      # DISCORD_WEBHOOK_URL: https://discord.com/api/webhooks/...
    depends_on:
      - filament-db
      - spoolman
    restart: unless-stopped

  filament-db:
    image: ghcr.io/hyiger/filament-db:latest
    ports:
      - "3000:3000"
    environment:
      # Filament DB is a Next.js app backed by MongoDB — it 500s on every API
      # call without this. State lives in MongoDB, not a local volume.
      MONGODB_URI: mongodb://mongo:27017/filamentdb
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    volumes:
      - ./private_data/filament-db:/data/db
    restart: unless-stopped

  spoolman:
    image: ghcr.io/donkie/spoolman:latest
    ports:
      - "7912:7912"
    environment:
      # Spoolman defaults to 8000 internally; pin it to 7912 so both the host
      # mapping above and the in-network http://spoolman:7912 (used by the bridge
      # service) resolve to the same port.
      SPOOLMAN_PORT: "7912"
    volumes:
      - ./private_data/spoolman:/home/app/.local/share/spoolman
    restart: unless-stopped
