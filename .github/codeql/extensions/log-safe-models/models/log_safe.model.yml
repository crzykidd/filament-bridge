# Declare core/log_safe.scrub() as a log-injection sanitizer (barrier).
#
# scrub() strips CR/LF + non-printable chars, flattening any value to a single
# safe log token. CodeQL can't infer this sanitization across the helper-call
# boundary, so every logger.*(... _scrub(x) ...) call gets a spurious
# py/log-injection (CWE-117) alert. This barrierModel tells the dataflow engine
# that scrub()'s return value is a barrier for the "log-injection" threat,
# killing the false positives while preserving log-injection coverage for any
# value that does NOT pass through scrub().
#
# Schema (CodeQL >= 2.25.2, models-as-data barriers):
#   [type, path, kind]
#     type = module where the search begins ("app.core.log_safe")
#     path = access path to the barrier value (Member[scrub].ReturnValue)
#     kind = query kind the barrier applies to ("log-injection")
# Mirrors the documented html.escape() / "html-injection" example.
extensions:
  - addsTo:
      pack: codeql/python-all
      extensible: barrierModel
    data:
      - ["app.core.log_safe", "Member[scrub].ReturnValue", "log-injection"]
