# CodeQL model pack: declares core/log_safe.scrub() a log-injection barrier.
#
# This is a data-extension (model) pack. It is PUBLISHED to GHCR by
# .github/workflows/codeql-pack-publish.yml and consumed by the CodeQL
# analysis via `packs:` in .github/codeql/config.yml. Unpublished in-repo
# packs cannot be loaded by codeql-action — publishing is mandatory.
#
# Bump `version` whenever models/*.yml changes, then re-run the publish
# workflow and update the pinned version in .github/codeql/config.yml.
name: crzykidd/log-safe-models
version: 1.0.0
library: true
extensionTargets:
  codeql/python-all: '*'
dataExtensions:
  - models/**/*.yml
