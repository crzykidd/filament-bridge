name: Publish CodeQL model pack

# Publishes the in-repo CodeQL model pack (.github/codeql/extensions/log-safe-models)
# to GHCR so the CodeQL analysis workflow can load it via `packs:`. codeql-action
# only resolves packs from the registry, so the pack MUST be published before the
# analysis config references it.
#
# Run manually (workflow_dispatch) after bumping the pack version, or automatically
# when the pack files change on main. After the FIRST publish, make the package
# public once (Settings → Packages → log-safe-models → visibility) so the analysis
# workflow can pull it without registry auth.

on:
  workflow_dispatch:
  push:
    # Publish whenever the pack itself changes. Scoped to the pack dir only (not
    # this workflow file) so editing the workflow doesn't trigger a republish.
    # `codeql pack publish` refuses to overwrite an existing version, so a push
    # that touches the pack without bumping `version` in codeql-pack.yml will
    # fail loudly — bump the version first, exactly like a release tag.
    branches: [main, dev]
    paths:
      - '.github/codeql/extensions/log-safe-models/**'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish log-safe-models
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install CodeQL CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="$(gh api repos/github/codeql-action/releases/latest --jq .tag_name)"
          echo "Using CodeQL bundle: $tag"
          gh release download "$tag" \
            --repo github/codeql-action \
            --pattern 'codeql-bundle-linux64.tar.gz' \
            --dir "$RUNNER_TEMP"
          tar -xzf "$RUNNER_TEMP/codeql-bundle-linux64.tar.gz" -C "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/codeql" >> "$GITHUB_PATH"

      - name: Show CodeQL version
        run: codeql version

      - name: Publish model pack to GHCR
        env:
          GITHUB_TOKEN: ${{ github.token }}
        working-directory: .github/codeql/extensions/log-safe-models
        run: codeql pack publish
