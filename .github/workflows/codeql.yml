name: CodeQL

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '30 4 * * 1'  # Monday 04:30 UTC

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
      packages: read  # pull the log-safe-models CodeQL pack from GHCR
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # Query suite + the log-safe-models barrier pack (pulled from GHCR using
          # the default workflow token, which can read the repo-linked package).
          config-file: ./.github/codeql/config.yml

      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
