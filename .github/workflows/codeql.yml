name: CodeQL

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '30 4 * * 1'  # Monday 04:30 UTC

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v4
        env:
          # The log-safe-models pack is in-repo (unpublished), so point CodeQL at the
          # extensions dir; otherwise `packs:` in config.yml tries to pull it from GHCR
          # and fails ("not found in the registry").
          CODEQL_ACTION_EXTRA_OPTIONS: '{"database":{"init":["--additional-packs","${{ github.workspace }}/.github/codeql/extensions"]}}'
        with:
          languages: ${{ matrix.language }}
          # Security-focused suite (security-extended) + the in-repo model pack that
          # marks core/log_safe.scrub() as a log-injection barrier. See config.yml.
          config-file: ./.github/codeql/config.yml

      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
